<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha QUILA</title>

  <style>
    :root {
      --verde: #176b2c;
      --verde-suave: #eef8f0;
      --amarillo: #f2dc5d;
      --amarillo-suave: #fff8dc;
      --lila: #8b5fbf;
      --lila-suave: #f4eefb;
      --gris: #374151;
      --borde: #d8ded9;
      --fondo: #f4f6f4;
      --rojo: #991b1b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--fondo);
      color: var(--gris);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab-btn {
      border: 0;
      border-radius: 12px;
      padding: 13px 18px;
      font-weight: 800;
      cursor: pointer;
      background: white;
      color: var(--gris);
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
    }

    .tab-btn.activo {
      background: var(--verde);
      color: white;
    }

    .card {
      background: white;
      border: 1px solid var(--borde);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 22px rgba(0,0,0,.05);
    }

    .card-verde {
      background: var(--verde-suave);
      border-color: #cfe6d4;
    }

    .card-amarilla {
      background: var(--amarillo-suave);
      border-color: #f2e2a4;
    }

    .card-lila {
      background: var(--lila-suave);
      border-color: #dccbed;
    }

    .titulo-seccion {
      font-size: 20px;
      font-weight: 900;
      margin: 0 0 15px;
    }

    .grilla {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .grilla-dos {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .campo-completo { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: white;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--verde);
      box-shadow: 0 0 0 3px rgba(23,107,44,.14);
    }

    .btn-principal {
      background: var(--verde);
      color: white;
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-weight: 900;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    .btn-principal:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .resultado {
      background: white;
      border: 1px solid var(--borde);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: .15s;
    }

    .resultado:hover {
      border-color: var(--verde);
      transform: translateY(-1px);
    }

    .resultado strong {
      color: var(--verde);
      font-size: 17px;
    }

    .mini {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    .ficha-resumen {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
    }

    .dato {
      background: white;
      border: 1px solid var(--borde);
      border-radius: 12px;
      padding: 11px;
    }

    .dato span {
      display: block;
      font-size: 11px;
      font-weight: 900;
      color: #6b7280;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .dato strong {
      font-size: 14px;
      color: #111827;
      word-break: break-word;
    }

    .historial-item {
      background: white;
      border: 1px solid var(--borde);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .historial-item strong { color: var(--lila); }

    .oculto { display: none !important; }

    .mensaje {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 14px;
      font-weight: 800;
    }

    .mensaje-error {
      background: #fee2e2;
      color: var(--rojo);
    }

    .mensaje-ok {
      background: #dcfce7;
      color: #166534;
    }

    .estado-carga {
      background: white;
      border: 1px solid var(--borde);
      border-radius: 14px;
      padding: 14px;
      color: #6b7280;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .grilla, .grilla-dos, .ficha-resumen {
        grid-template-columns: repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width: 640px) {
      main { padding: 12px; }

      .grilla, .grilla-dos, .ficha-resumen {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
<main>

  <div class="tabs">
    <button class="tab-btn activo" onclick="mostrarVista('buscar')">Buscar mascota</button>
    <button class="tab-btn" onclick="mostrarVista('nueva')">Crear mascota nueva</button>
  </div>

  <div id="mensajeGlobal"></div>

  <!-- BUSCAR -->
  <section id="vistaBuscar">

    <div class="card card-verde">
      <h1 class="titulo-seccion">Buscador QUILA</h1>

      <label for="busqueda">Buscar por mascota, tutor, WhatsApp, alimento o sector</label>
      <input
        id="busqueda"
        type="text"
        placeholder="Ej: Filipa, Carolina, 569..., Bravery"
        oninput="buscarLocal()"
        disabled
      >

      <div id="estadoBase" class="mini">Cargando base de mascotas...</div>
    </div>

    <div id="resultados"></div>

    <section id="panelFicha" class="oculto">

      <div class="card card-verde">
        <h2 class="titulo-seccion">Ficha de mascota</h2>
        <div id="resumenMascota" class="ficha-resumen"></div>
      </div>

      <div class="card card-lila">
        <h2 class="titulo-seccion">Historial</h2>
        <div id="historialMascota">
          <div class="estado-carga">Cargando historial...</div>
        </div>
      </div>

      <div class="card card-amarilla">
        <h2 class="titulo-seccion">Registrar nueva atención</h2>

        <form id="formAtencion">

          <input type="hidden" id="atencion_id_mascota" name="id_mascota">
          <input type="hidden" id="atencion_nombre_mascota" name="nombre_mascota">
          <input type="hidden" id="atencion_nombre_tutor" name="nombre_tutor">
          <input type="hidden" id="atencion_whatsapp" name="whatsapp">

          <div class="grilla-dos">

            <div>
              <label>Tipo de evento</label>
              <select name="tipo_evento">
                <option value="Compra / atención">Compra / atención</option>
                <option value="Consulta">Consulta</option>
                <option value="Seguimiento">Seguimiento</option>
                <option value="Cambio de alimento">Cambio de alimento</option>
              </select>
            </div>

            <div>
              <label>Motivo de la visita</label>
              <select name="motivo_visita" id="motivo_visita" required onchange="mostrarOtro('motivo_visita','campo_otro_motivo_visita','otro_motivo_visita')">
                <option value="">Seleccionar...</option>
                <option value="Compra mismo alimento">Compra mismo alimento</option>
                <option value="Busca alternativa">Busca alternativa</option>
                <option value="Busca recomendación">Busca recomendación</option>
                <option value="Primera compra">Primera compra</option>
                <option value="Otro">Otro</option>
              </select>
            </div>

            <div id="campo_otro_motivo_visita" class="oculto">
              <label>Especificar motivo de visita</label>
              <input name="otro_motivo_visita" id="otro_motivo_visita" placeholder="Ej: busca sabor distinto">
            </div>

            <div>
              <label>Motivo principal</label>
              <select name="motivo_principal" id="motivo_principal" onchange="mostrarOtro('motivo_principal','campo_otro_motivo_principal','otro_motivo_principal')">
                <option value="">Seleccionar...</option>
                <option value="Precio">Precio</option>
                <option value="Digestión">Digestión</option>
                <option value="Piel / pelaje">Piel / pelaje</option>
                <option value="Recomendación veterinaria">Recomendación veterinaria</option>
                <option value="Mejor calidad">Mejor calidad</option>
                <option value="No encontró su marca">No encontró su marca</option>
                <option value="Mantener alimentación actual">Mantener alimentación actual</option>
                <option value="Otro">Otro</option>
              </select>
            </div>

            <div id="campo_otro_motivo_principal" class="oculto">
              <label>Especificar motivo principal</label>
              <input name="otro_motivo_principal" id="otro_motivo_principal" placeholder="Ej: quiere formato más pequeño">
            </div>

            <div>
              <label>Producto recomendado / comprado</label>
              <input name="producto_recomendado" placeholder="Ej: Pro Plan Sterilized 3 kg">
            </div>

            <div>
              <label>Razón de la recomendación</label>
              <input name="razon_recomendacion" placeholder="Ej: mejor relación calidad-precio">
            </div>

            <div>
              <label>Fecha compra</label>
              <input type="date" name="fecha_compra" id="fecha_compra">
            </div>

            <div>
              <label>Fecha estimada reposición</label>
              <input type="date" name="fecha_reposicion">
            </div>

            <div>
              <label>Fecha próximo contacto</label>
              <input type="date" name="fecha_contacto">
            </div>

            <div>
              <label>Perfil cliente</label>
              <select name="perfil_cliente">
                <option value="">Seleccionar...</option>
                <option value="Compra por calidad">Compra por calidad</option>
                <option value="Compra por precio">Compra por precio</option>
                <option value="Fiel a marca">Fiel a marca</option>
                <option value="Abierto a alternativas">Abierto a alternativas</option>
                <option value="Tiene varias mascotas">Tiene varias mascotas</option>
                <option value="Cliente parcela">Cliente parcela</option>
              </select>
            </div>

            <div class="campo-completo">
              <label>Observaciones de esta atención</label>
              <textarea name="observaciones" placeholder="Ej: quedó en probar alternativa la próxima compra, aún tiene alimento para transición..."></textarea>
            </div>

            <div class="campo-completo">
              <label>
                <input type="checkbox" name="actualizar_alimento_habitual" value="true">
                Actualizar alimento habitual con este producto
              </label>
            </div>

          </div>

          <br>

          <button type="submit" id="btnGuardarAtencion" class="btn-principal">
            Guardar nueva atención
          </button>

          <div id="confirmacionAtencion" class="mensaje mensaje-ok oculto" style="margin-top:14px;">
            ✅ Atención guardada correctamente
          </div>

        </form>
      </div>

    </section>

  </section>

  <!-- NUEVA MASCOTA -->
  <section id="vistaNueva" class="oculto">

    <div class="card card-verde">
      <h1 class="titulo-seccion">Crear mascota nueva</h1>

      <form id="formNuevaMascota">

        <div class="grilla">

          <div>
            <label>Nombre y apellido tutor</label>
            <input name="nombre_tutor" required placeholder="Ej: Carolina Pérez">
          </div>

          <div>
            <label>WhatsApp</label>
            <input name="whatsapp" required maxlength="11" placeholder="569XXXXXXXX" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          </div>

          <div>
            <label>Sector</label>
            <input name="sector" placeholder="Ej: Jardín del Este">
          </div>

          <div>
            <label>Nombre mascota</label>
            <input name="nombre_mascota" required placeholder="Ej: Filipa">
          </div>

          <div>
            <label>Especie</label>
            <select name="especie" required>
              <option value="">Seleccionar...</option>
              <option value="Perro">Perro</option>
              <option value="Gato">Gato</option>
              <option value="Otro">Otro</option>
            </select>
          </div>

          <div>
            <label>Raza</label>
            <input name="raza" placeholder="Ej: Mestizo">
          </div>

          <div>
            <label>Sexo</label>
            <select name="sexo">
              <option value="">Seleccionar...</option>
              <option value="Macho">Macho</option>
              <option value="Hembra">Hembra</option>
            </select>
          </div>

          <div>
            <label>Esterilizado/a</label>
            <select name="esterilizado">
              <option value="">Seleccionar...</option>
              <option value="Sí">Sí</option>
              <option value="No">No</option>
            </select>
          </div>

          <div>
            <label>Etapa</label>
            <input name="etapa" placeholder="Ej: Adulto">
          </div>

          <div>
            <label>Peso actual kg</label>
            <input name="peso_actual_kg" type="number" step="0.1">
          </div>

          <div>
            <label>Edad meses</label>
            <input name="edad_meses" type="number">
          </div>

          <div>
            <label>Peso adulto estimado kg</label>
            <input name="peso_adulto_estimado_kg" type="number" step="0.1">
          </div>

          <div>
            <label>Edad años</label>
            <input name="edad_anios" type="number">
          </div>

          <div class="campo-completo">
            <label>Condición relevante</label>
            <input name="condicion_relevante" placeholder="Ej: alergia al pollo, digestión sensible...">
          </div>

          <div>
            <label>Alimento habitual</label>
            <input name="alimento_habitual" placeholder="Ej: Bravery Salmón">
          </div>

          <div>
            <label>Formato kg</label>
            <input name="formato_kg" placeholder="Ej: 2">
          </div>

          <div>
            <label>Tiempo de consumo</label>
            <input name="tiempo_consumo" placeholder="Ej: Más de 3 meses">
          </div>

          <div class="campo-completo">
            <label>Observación base</label>
            <textarea name="observacion_base" placeholder="Ej: cliente frecuente, vive en parcela, compra a fin de mes..."></textarea>
          </div>

        </div>

        <br>

        <button type="submit" id="btnCrearMascota" class="btn-principal">
          Crear mascota
        </button>

        <div id="confirmacionMascota" class="mensaje mensaje-ok oculto" style="margin-top:14px;">
          ✅ Mascota creada correctamente
        </div>

      </form>
    </div>

  </section>

</main>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbx-AN3EhrJm8-loizR0UkpT-Ue7uYjfQ-NHcFtR7nbPSskIkuOmSDqV2gZ-gcQuYpXpag/exec";

  let mascotasBase = [];
  let mascotaActual = null;
  let ultimaAutoApertura = "";

  document.getElementById("fecha_compra").valueAsDate = new Date();

  window.addEventListener("load", cargarBaseMascotas);

  function normalizar(texto) {
    return String(texto || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function mostrarMensaje(texto, tipo = "ok") {
    const div = document.getElementById("mensajeGlobal");
    div.innerHTML = `<div class="mensaje ${tipo === "error" ? "mensaje-error" : "mensaje-ok"}">${texto}</div>`;
    setTimeout(() => div.innerHTML = "", 4500);
  }

  function mostrarVista(vista) {
    document.getElementById("vistaBuscar").classList.toggle("oculto", vista !== "buscar");
    document.getElementById("vistaNueva").classList.toggle("oculto", vista !== "nueva");

    const botones = document.querySelectorAll(".tab-btn");
    botones.forEach(btn => btn.classList.remove("activo"));

    if (vista === "buscar") botones[0].classList.add("activo");
    if (vista === "nueva") botones[1].classList.add("activo");
  }

  function jsonp(url) {
    return new Promise((resolve, reject) => {
      const callbackName = "jsonp_callback_" + Math.round(100000 * Math.random());

      window[callbackName] = function(data) {
        delete window[callbackName];
        document.body.removeChild(script);
        resolve(data);
      };

      const script = document.createElement("script");
      script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + callbackName;
      script.onerror = reject;

      document.body.appendChild(script);
    });
  }

  async function cargarBaseMascotas() {
    const input = document.getElementById("busqueda");
    const estado = document.getElementById("estadoBase");

    input.disabled = true;
    estado.textContent = "Cargando base de mascotas...";

    try {
      const data = await jsonp(`${API_URL}?action=listarMascotas`);

      if (!data.ok) {
        estado.textContent = "No fue posible cargar la base de mascotas.";
        mostrarMensaje(data.error || "Error cargando mascotas", "error");
        return;
      }

      mascotasBase = data.resultados || [];
      input.disabled = false;
      estado.textContent = `Base cargada: ${mascotasBase.length} mascotas.`;

    } catch (error) {
      console.error(error);
      estado.textContent = "No fue posible cargar la base. Revisa conexión.";
      mostrarMensaje("No fue posible cargar la base de mascotas.", "error");
    }
  }

  function buscarLocal() {
    const q = normalizar(document.getElementById("busqueda").value);
    const contenedor = document.getElementById("resultados");
    const panelFicha = document.getElementById("panelFicha");

    panelFicha.classList.add("oculto");

    if (q.length < 2) {
      contenedor.innerHTML = "";
      ultimaAutoApertura = "";
      return;
    }

    const resultados = mascotasBase
      .map(m => {
        const nombreMascota = normalizar(m.nombre_mascota);
        const nombreTutor = normalizar(m.nombre_tutor);
        const whatsapp = normalizar(m.whatsapp);

        const textoPrincipal = normalizar([
          m.nombre_mascota,
          m.nombre_tutor,
          m.whatsapp
        ].join(" "));

        const textoSecundario = normalizar([
          m.id_mascota,
          m.raza,
          m.alimento_habitual,
          m.sector
        ].join(" "));

        const coincideExactoMascota = nombreMascota === q;
        const coincideInicioMascota = nombreMascota.startsWith(q);
        const coincideTutor = nombreTutor.includes(q);
        const coincideWhatsapp = whatsapp.includes(q);
        const coincidePrincipal = textoPrincipal.includes(q);
        const coincideSecundario = textoSecundario.includes(q);

        if (!(coincidePrincipal || coincideSecundario)) return null;

        return {
          ...m,
          prioridad:
            coincideExactoMascota ? 1 :
            coincideInicioMascota ? 2 :
            coincideTutor ? 3 :
            coincideWhatsapp ? 3 :
            coincidePrincipal ? 4 :
            5,
          exacta: coincideExactoMascota
        };
      })
      .filter(Boolean)
      .sort((a, b) => a.prioridad - b.prioridad)
      .slice(0, 20);

    if (!resultados.length) {
      contenedor.innerHTML = `<div class="card">No se encontraron resultados.</div>`;
      return;
    }

const coincidenciasExactas = resultados.filter(r => r.exacta);

const resultadosVisibles =
  coincidenciasExactas.length === 1
    ? coincidenciasExactas
    : resultados;

contenedor.innerHTML = resultadosVisibles.map(m => `
  <div class="resultado" onclick="cargarFicha('${escapeHtml(m.id_mascota)}')">
    <strong>${escapeHtml(m.nombre_mascota || "Sin nombre")}</strong>
    <div class="mini">
      Tutor: ${escapeHtml(m.nombre_tutor || "-")} · 
      ${escapeHtml(m.especie || "-")} · 
      ${escapeHtml(m.raza || "-")}
    </div>
    <div class="mini">
      Alimento habitual: ${escapeHtml(m.alimento_habitual || "-")} 
      ${m.formato_kg ? "· " + escapeHtml(m.formato_kg) + " kg" : ""}
    </div>
  </div>
`).join("");

if (
  coincidenciasExactas.length === 1 &&
  ultimaAutoApertura !== coincidenciasExactas[0].id_mascota
) {
  ultimaAutoApertura = coincidenciasExactas[0].id_mascota;
  cargarFicha(coincidenciasExactas[0].id_mascota);
}

  async function cargarFicha(idMascota) {
    const mascotaLocal = mascotasBase.find(m => String(m.id_mascota) === String(idMascota));

    if (mascotaLocal) {
      mascotaActual = mascotaLocal;
      mostrarResumenDesdeLocal(mascotaLocal);
      prepararFormularioAtencionDesdeLocal(mascotaLocal);
      document.getElementById("historialMascota").innerHTML =
        `<div class="estado-carga">Cargando historial...</div>`;
      document.getElementById("panelFicha").classList.remove("oculto");
    }

    try {
      const data = await jsonp(`${API_URL}?action=obtenerFicha&id=${encodeURIComponent(idMascota)}`);

      if (!data.ok) {
        mostrarMensaje(data.error || "No se pudo cargar la ficha", "error");
        return;
      }

      mascotaActual = data.mascota;

      mostrarResumen(data.mascota);
      mostrarHistorial(data.historial || []);
      prepararFormularioAtencion(data.mascota);

      document.getElementById("panelFicha").classList.remove("oculto");

      window.scrollTo({
        top: document.getElementById("panelFicha").offsetTop - 10,
        behavior: "smooth"
      });

    } catch (error) {
      console.error(error);
      mostrarMensaje("No fue posible cargar el historial.", "error");
    }
  }

  function mostrarResumenDesdeLocal(m) {
    const contenedor = document.getElementById("resumenMascota");

    contenedor.innerHTML = `
      ${dato("Mascota", m.nombre_mascota)}
      ${dato("Tutor", m.nombre_tutor)}
      ${dato("WhatsApp", m.whatsapp)}
      ${dato("Sector", m.sector)}
      ${dato("Especie", m.especie)}
      ${dato("Raza", m.raza)}
      ${dato("Sexo", m.sexo)}
      ${dato("Esterilizado", m.esterilizado)}
      ${dato("Etapa", m.etapa)}
      ${dato("Peso", m.peso_actual_kg ? m.peso_actual_kg + " kg" : "")}
      ${dato("Condición", m.condicion)}
      ${dato("Alimento habitual", `${m.alimento_habitual || ""} ${m.formato_kg ? "· " + m.formato_kg + " kg" : ""}`)}
      ${dato("Observación base", m.observacion_base)}
    `;
  }

  function mostrarResumen(m) {
    const contenedor = document.getElementById("resumenMascota");

    contenedor.innerHTML = `
      ${dato("Mascota", m["NOMBRE MASCOTA"])}
      ${dato("Tutor", m["NOMBRE TUTOR"])}
      ${dato("WhatsApp", m["WHATSAPP"])}
      ${dato("Sector", m["SECTOR"])}
      ${dato("Especie", m["ESPECIE"])}
      ${dato("Raza", m["RAZA"])}
      ${dato("Sexo", m["SEXO"])}
      ${dato("Esterilizado", m["ESTERILIZADO"])}
      ${dato("Etapa", m["ETAPA"])}
      ${dato("Peso", m["PESO ACTUAL KG"] ? m["PESO ACTUAL KG"] + " kg" : "")}
      ${dato("Condición", m["CONDICIÓN RELEVANTE"])}
      ${dato("Alimento habitual", `${m["ALIMENTO HABITUAL"] || ""} ${m["FORMATO KG"] ? "· " + m["FORMATO KG"] + " kg" : ""}`)}
      ${dato("Observación base", m["OBSERVACIÓN BASE"])}
    `;
  }

  function dato(label, valor) {
    return `
      <div class="dato">
        <span>${escapeHtml(label)}</span>
        <strong>${escapeHtml(valor || "-")}</strong>
      </div>
    `;
  }

  function mostrarHistorial(historial) {
    const contenedor = document.getElementById("historialMascota");

    if (!historial.length) {
      contenedor.innerHTML = `<div class="historial-item">Aún no hay historial registrado.</div>`;
      return;
    }

    contenedor.innerHTML = historial.slice(0, 10).map(h => `
      <div class="historial-item">
        <strong>${formatearFecha(h["FECHA REGISTRO"])}</strong>
        <div class="mini">Tipo: ${escapeHtml(h["TIPO EVENTO"] || "-")}</div>
        <div class="mini">Motivo: ${escapeHtml(h["MOTIVO VISITA"] || "-")} / ${escapeHtml(h["MOTIVO PRINCIPAL"] || "-")}</div>
        <div class="mini">Producto: ${escapeHtml(h["PRODUCTO RECOMENDADO"] || "-")}</div>
        <div class="mini">Razón: ${escapeHtml(h["RAZÓN RECOMENDACIÓN"] || "-")}</div>
        <div class="mini">Reposición: ${escapeHtml(h["FECHA REPOSICIÓN"] || "-")} · Contacto: ${escapeHtml(h["FECHA PRÓXIMO CONTACTO"] || "-")}</div>
        <div class="mini">Obs: ${escapeHtml(h["OBSERVACIONES"] || "-")}</div>
      </div>
    `).join("");
  }

  function prepararFormularioAtencionDesdeLocal(m) {
    document.getElementById("formAtencion").reset();
    document.getElementById("confirmacionAtencion").classList.add("oculto");

    document.getElementById("fecha_compra").valueAsDate = new Date();

    document.getElementById("atencion_id_mascota").value = m.id_mascota || "";
    document.getElementById("atencion_nombre_mascota").value = m.nombre_mascota || "";
    document.getElementById("atencion_nombre_tutor").value = m.nombre_tutor || "";
    document.getElementById("atencion_whatsapp").value = m.whatsapp || "";

    document.getElementById("campo_otro_motivo_visita").classList.add("oculto");
    document.getElementById("campo_otro_motivo_principal").classList.add("oculto");
  }

  function prepararFormularioAtencion(m) {
    document.getElementById("formAtencion").reset();
    document.getElementById("confirmacionAtencion").classList.add("oculto");

    document.getElementById("fecha_compra").valueAsDate = new Date();

    document.getElementById("atencion_id_mascota").value = m["ID MASCOTA"] || "";
    document.getElementById("atencion_nombre_mascota").value = m["NOMBRE MASCOTA"] || "";
    document.getElementById("atencion_nombre_tutor").value = m["NOMBRE TUTOR"] || "";
    document.getElementById("atencion_whatsapp").value = m["WHATSAPP"] || "";

    document.getElementById("campo_otro_motivo_visita").classList.add("oculto");
    document.getElementById("campo_otro_motivo_principal").classList.add("oculto");
  }

  function mostrarOtro(selectId, campoId, inputId) {
    const select = document.getElementById(selectId);
    const campo = document.getElementById(campoId);
    const input = document.getElementById(inputId);

    if (select.value === "Otro") {
      campo.classList.remove("oculto");
      input.required = true;
    } else {
      campo.classList.add("oculto");
      input.required = false;
      input.value = "";
    }
  }

  document.getElementById("formAtencion").addEventListener("submit", async function(e) {
    e.preventDefault();

    const btn = document.getElementById("btnGuardarAtencion");
    const confirmacion = document.getElementById("confirmacionAtencion");

    confirmacion.classList.add("oculto");
    btn.disabled = true;
    btn.textContent = "Guardando...";

    const formData = new FormData(this);
    const datos = Object.fromEntries(formData.entries());

    datos.action = "registrarAtencion";

    try {
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(datos)
      });

      confirmacion.classList.remove("oculto");
      mostrarMensaje("Atención guardada correctamente.");

      if (datos.id_mascota) {
        setTimeout(() => cargarFicha(datos.id_mascota), 1200);
      }

    } catch (error) {
      console.error(error);
      mostrarMensaje("No fue posible guardar la atención.", "error");

    } finally {
      btn.disabled = false;
      btn.textContent = "Guardar nueva atención";
    }
  });

  document.getElementById("formNuevaMascota").addEventListener("submit", async function(e) {
    e.preventDefault();

    const btn = document.getElementById("btnCrearMascota");
    const confirmacion = document.getElementById("confirmacionMascota");

    confirmacion.classList.add("oculto");
    btn.disabled = true;
    btn.textContent = "Creando mascota...";

    const formData = new FormData(this);
    const datos = Object.fromEntries(formData.entries());

    datos.action = "crearMascota";

    try {
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(datos)
      });

      confirmacion.classList.remove("oculto");
      mostrarMensaje("Mascota creada correctamente.");

      this.reset();

      setTimeout(async () => {
        await cargarBaseMascotas();
        mostrarVista("buscar");
      }, 1200);

    } catch (error) {
      console.error(error);
      mostrarMensaje("No fue posible crear la mascota.", "error");

    } finally {
      btn.disabled = false;
      btn.textContent = "Crear mascota";
    }
  });

  function escapeHtml(texto) {
    return String(texto || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatearFecha(valor) {
    if (!valor) return "-";

    const fecha = new Date(valor);

    if (isNaN(fecha.getTime())) return valor;

    return fecha.toLocaleDateString("es-CL", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit"
    });
  }
</script>
